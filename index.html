<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Horários · EMEF Quintino Bocaiuva</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #eef2f8; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        .header-institucional { width: 100%; max-width: 1400px; margin: 0 auto 15px; display: flex; justify-content: center; background: white; padding: 10px; border-radius: 15px; }
        .header-institucional img { width: 100%; max-width: 1200px; height: auto; }
        
        .main-container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        .toolbar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; align-items: center; }
        .search-container { flex-grow: 1; display: flex; gap: 10px; align-items: center; min-width: 250px; }
        .search-input { flex-grow: 1; padding: 12px 20px; border-radius: 40px; border: 2px solid #cbd5e1; outline: none; font-size: 16px; }

        .btn { border: none; padding: 10px 20px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; min-height: 44px; }
        .btn-navy { background: #1e3a5f; }
        .btn-red { background: #ef4444; }
        .btn-lock { background: #64748b; font-size: 1.1rem; padding: 8px 15px; }
        .btn-lock.unlocked { background: #f59e0b; }

        #loginOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        .login-box input, .login-box select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }

        .grid-wrapper { width: 100%; overflow-x: auto; border-radius: 10px; border: 1px solid #cbd5e1; }
        .schedule-grid { display: grid; grid-template-columns: 100px repeat(16, minmax(100px, 1fr)); font-size: 0.75rem; background: white; min-width: 1200px; }
        
        .grid-header, .time-slot { background: #f8fafc; font-weight: bold; text-align: center; padding: 8px 4px; border-bottom: 1px solid #cbd5e1; border-right: 1px solid #cbd5e1; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .schedule-cell { border-bottom: 0.5px solid #e2e8f0; border-right: 0.5px solid #e2e8f0; padding: 8px 4px; min-height: 80px; position: relative; text-align: center; display: flex; flex-direction: column; justify-content: center; background-color: white; }
        
        .edit-mode .grid-header:not(:first-child), .edit-mode .time-slot { background: #fff7ed !important; cursor: pointer !important; border: 1px dashed #f59e0b !important; }
        
        /* CORES DE IDENTIFICAÇÃO */
        .cell-quebrada { background-color: #fef9c3 !important; border: 1px solid #facc15 !important; } /* Amarelo para '*' */
        .cell-hi { background-color: #ffcfcf !important; border: 1.5px solid #ef4444 !important; }
        .cell-hl { background-color: #d1fae5 !important; border: 1.5px solid #10b981 !important; }
        .cell-highlight { background-color: #bae6fd !important; transform: scale(1.01); z-index: 5; }

        .tabs-row { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .tab { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; white-space: nowrap; }
        .tab.active { background: #1e3a5f; color: white; }

        .footer-area { margin-top: 20px; padding: 20px; border-radius: 12px; background: #fffbeb; border: 2px dashed #f59e0b; }
        .editable-legend { font-size: 1rem; min-height: 40px; outline: none; font-weight: bold; color: #1e3a5f; border-bottom: 1px solid #fde68a; margin-bottom: 10px; padding: 5px; }
        .status-indicator { font-size: 0.8rem; font-weight: bold; margin-left: 10px; color: #64748b; }

        @media (max-width: 768px) {
            #loginOverlay { align-items: flex-start; padding-top: 10%; }
            .main-container { padding: 10px; border-radius: 10px; }
            .schedule-grid { font-size: 0.7rem; }
            .btn { padding: 10px 15px; font-size: 0.9rem; }
        }

        @media print {
            .toolbar, .tabs-row, .btn-lock, #loginOverlay { display: none !important; }
            .grid-wrapper { overflow: visible !important; }
            .schedule-grid { min-width: 100% !important; grid-template-columns: 80px repeat(16, 1fr) !important; }
        }
    </style>
</head>
<body id="mainBody">

<div id="loginOverlay">
    <div class="login-box">
        <h3>Acesso Gestão</h3>
        <select id="userSelect">
            <option value="DIR">DIR: Karen</option>
            <option value="VIC">VIC: Veronica</option>
            <option value="CRD">CRD: Larissa</option>
        </select>
        <input type="password" id="passInput" placeholder="Senha" inputmode="numeric">
        <button class="btn btn-navy" style="width:100%" onclick="window.tryLogin()">Entrar</button>
        <button class="btn" style="background:none; color:gray; width:100%; margin-top:10px;" onclick="window.closeLogin()">Cancelar</button>
    </div>
</div>

<div class="header-institucional">
    <img src="https://raw.githubusercontent.com/emefquintinobocaiuva/horarioquintino26/main/imagens/cabecquintino.jpg">
</div>

<div class="main-container">
    <div class="toolbar">
        <div class="search-container">
            <input type="text" id="teacherSearch" class="search-input" placeholder="🔍 Buscar professor...">
            <button id="lockBtn" class="btn btn-lock" onclick="window.openLogin()">🔒</button>
        </div>
        <div id="editButtons" style="display:none; gap:8px;">
            <button class="btn btn-navy" onclick="window.copyFullDay()">📋 Copiar</button>
            <button class="btn btn-navy" onclick="window.pasteFullDay()">📥 Colar</button>
        </div>
        <button class="btn btn-red" onclick="window.print()">🖨️ PDF</button>
        <span id="cloudStatus" class="status-indicator">⏳...</span>
    </div>
    
    <div class="tabs-row" id="shiftTabs"></div>
    <div class="tabs-row" id="dayTabs"></div>
    
    <div class="grid-wrapper">
        <div id="scheduleGrid"></div>
    </div>

    <div class="footer-area">
        <div class="editable-legend" id="footerLegend" contenteditable="false" onblur="window.saveAuto()">
            ⏱️ INTERVALOS...
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjs0Emwh1Eyqf7pXYEJt9MBfY0Ga8ZJBc",
        authDomain: "gestao-de-horario.firebaseapp.com",
        databaseURL: "https://gestao-de-horario-default-rtdb.firebaseio.com",
        projectId: "gestao-de-horario",
        storageBucket: "gestao-de-horario.firebasestorage.app",
        messagingSenderId: "1074574504996",
        appId: "1:1074574504996:web:87e81456b1460e03a4d4b1",
        measurementId: "G-638DL9JWS8"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'horarios_quintino');

    window.saveAuto = function() {
        if(!window.isEditing) return;
        document.getElementById('cloudStatus').innerText = "🔄 Salvando...";
        if(!window.config[window.activeShift].legendasPorDia) window.config[window.activeShift].legendasPorDia = {};
        window.config[window.activeShift].legendasPorDia[window.activeDay] = document.getElementById("footerLegend").innerText;
        
        set(dbRef, {config: window.config, userPass: window.userPass})
            .then(() => {
                document.getElementById('cloudStatus').innerText = "✅ Salvo";
                setTimeout(() => { if(document.getElementById('cloudStatus').innerText === "✅ Salvo") document.getElementById('cloudStatus').innerText = "☁️ Sincronizado"; }, 2000);
            })
            .catch(() => { document.getElementById('cloudStatus').innerText = "❌ Erro"; });
    };

    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        if (data && data.config) {
            window.config = data.config;
            window.userPass = data.userPass || "321";
            document.getElementById('cloudStatus').innerText = "☁️ Sincronizado";
        } else {
            window.initData(); 
        }
        window.renderAll();
    });
</script>

<script>
    const DIAS = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];
    window.isEditing = false;
    window.userPass = "321";
    window.activeShift = "manha";
    window.activeDay = "Segunda";
    let dayClipboard = null;
    let draggedData = null;
    let searchTerm = "";

    window.config = {
        manha: { 
            aulas: [{l:"1ª",h:"7:10"},{l:"2ª",h:"8:00"},{l:"3ª",h:"8:50"},{l:"4ª",h:"10:00"},{l:"5ª",h:"10:50"}],
            turmas: ["1ºA","1ºB","1ºC","1ºD","1ºE","2ºA","2ºB","2ºC","3ºA","3ºB","4ºA","4ºB","4ºC","5ºA","5ºB","5ºC"],
            data: {}, legendasPorDia: {}
        },
        tarde: {
            aulas: [{l:"1ª",h:"13:30"},{l:"2ª",h:"14:20"},{l:"3ª",h:"15:10"},{l:"4ª",h:"16:20"},{l:"5ª",h:"17:10"}],
            turmas: ["1ºE","1ºF","1ºG","2ºD","2ºE","2ºF","2ºG","3ºD","3ºE","3ºF","4ºD","4ºE","4ºF","5ºD","5ºE","5ºF"],
            data: {}, legendasPorDia: {}
        }
    };

    window.initData = function() {
        ["manha", "tarde"].forEach(s => {
            DIAS.forEach(d => {
                if(!window.config[s].data[d]) {
                    window.config[s].data[d] = Array(5).fill().map(() => Array(16).fill().map(() => ({ teacher: "Livre", room: "---" })));
                }
                if(!window.config[s].legendasPorDia) window.config[s].legendasPorDia = {};
                if(!window.config[s].legendasPorDia[d]) window.config[s].legendasPorDia[d] = `⏱️ INTERVALOS ${s.toUpperCase()} (${d}): ...`;
            });
        });
        window.renderAll();
    }

    window.tryLogin = function() {
        if(document.getElementById("passInput").value === window.userPass) {
            window.isEditing = true;
            document.getElementById("mainBody").classList.add("edit-mode");
            document.getElementById("lockBtn").classList.add("unlocked");
            document.getElementById("lockBtn").innerText = "🔓";
            document.getElementById("footerLegend").contentEditable = "true";
            document.getElementById("editButtons").style.display = "flex";
            document.getElementById("loginOverlay").style.display = "none";
            window.renderAll();
        } else { alert("Senha incorreta!"); }
    }
    
    window.openLogin = function() { if(window.isEditing) location.reload(); else document.getElementById("loginOverlay").style.display = "flex"; }
    window.closeLogin = function() { document.getElementById("loginOverlay").style.display = "none"; }

    window.editTurma = function(idx) {
        if(!window.isEditing) return;
        const novo = prompt("Renomear Turma:", window.config[window.activeShift].turmas[idx]);
        if(novo) { window.config[window.activeShift].turmas[idx] = novo; window.saveAuto(); window.renderAll(); }
    }

    window.editHora = function(idx) {
        if(!window.isEditing) return;
        const aula = window.config[window.activeShift].aulas[idx];
        const novaL = prompt("Rótulo da Aula:", aula.l);
        const novaH = prompt("Horário da Aula:", aula.h);
        if(novaL || novaH) {
            window.config[window.activeShift].aulas[idx] = {l: novaL || aula.l, h: novaH || aula.h};
            window.saveAuto(); window.renderAll();
        }
    }

    function createGridHTML(dia, shiftKey) {
        const shift = window.config[shiftKey];
        const gridData = shift.data[dia];
        let html = `<div class="schedule-grid"><div class="grid-header">Horas</div>`;
        shift.turmas.forEach((t, i) => html += `<div class="grid-header" onclick="window.editTurma(${i})">${t}</div>`);
        shift.aulas.forEach((aula, aIdx) => {
            html += `<div class="time-slot" onclick="window.editHora(${aIdx})">${aula.l}<br>${aula.h}</div>`;
            shift.turmas.forEach((turma, tIdx) => {
                const cell = gridData[aIdx][tIdx];
                const profOriginal = cell.teacher || "Livre";
                const profUpper = profOriginal.toUpperCase();
                let classes = "schedule-cell";
                
                // Lógica de cores baseada no asterisco e siglas
                if (profOriginal.includes('*')) {
                    classes += " cell-quebrada";
                }
                if (profUpper.includes("HI")) {
                    classes += " cell-hi";
                } else if (profUpper.includes("HL")) {
                    classes += " cell-hl";
                }
                
                if (searchTerm && profUpper !== "LIVRE" && profUpper.includes(searchTerm.toUpperCase())) {
                    classes += " cell-highlight";
                }

                html += `<div class="${classes}" draggable="${window.isEditing}" ondragstart="handleDragStart(event, ${aIdx}, ${tIdx})" ondragover="event.preventDefault()" ondrop="handleDrop(event, ${aIdx}, ${tIdx})" onclick="window.editCell(${aIdx}, ${tIdx})">
                            <strong>${profOriginal}</strong><br><small>S: ${cell.room}</small>
                         </div>`;
            });
        });
        return html + `</div>`;
    }

    window.editCell = function(aIdx, tIdx) {
        if(!window.isEditing) return;
        const data = window.config[window.activeShift].data[window.activeDay][aIdx][tIdx];
        const n = prompt("Professor:", data.teacher);
        if (n !== null) {
            const r = prompt("Sala:", data.room);
            window.config[window.activeShift].data[window.activeDay][aIdx][tIdx] = { teacher: n || "Livre", room: r || "---" };
            window.saveAuto(); window.renderAll();
        }
    }

    function handleDragStart(e, aIdx, tIdx) {
        if(!window.isEditing) return;
        draggedData = { aIdx, tIdx, content: {...window.config[window.activeShift].data[window.activeDay][aIdx][tIdx]} };
    }
    function handleDrop(e, aIdx, tIdx) {
        e.preventDefault();
        if(!window.isEditing || !draggedData) return;
        if (!e.ctrlKey) window.config[window.activeShift].data[window.activeDay][draggedData.aIdx][draggedData.tIdx] = { teacher: "Livre", room: "---" };
        window.config[window.activeShift].data[window.activeDay][aIdx][tIdx] = draggedData.content;
        draggedData = null; window.saveAuto(); window.renderAll();
    }

    window.copyFullDay = function() { 
        dayClipboard = {
            data: JSON.parse(JSON.stringify(window.config[window.activeShift].data[window.activeDay])),
            legenda: window.config[window.activeShift].legendasPorDia[window.activeDay]
        };
        alert("Dia completo copiado!"); 
    }
    window.pasteFullDay = function() {
        if(!dayClipboard) return;
        window.config[window.activeShift].data[window.activeDay] = JSON.parse(JSON.stringify(dayClipboard.data));
        window.config[window.activeShift].legendasPorDia[window.activeDay] = dayClipboard.legenda;
        window.saveAuto(); window.renderAll();
    }

    window.renderAll = function() {
        document.getElementById("shiftTabs").innerHTML = ["manha", "tarde"].map(s => `<div class="tab ${window.activeShift===s?'active':''}" onclick="window.activeShift='${s}';window.renderAll()">${s.toUpperCase()}</div>`).join("");
        document.getElementById("dayTabs").innerHTML = DIAS.map(d => `<div class="tab ${window.activeDay===d?'active':''}" onclick="window.activeDay='${d}';window.renderAll()">${d}</div>`).join("");
        document.getElementById("scheduleGrid").innerHTML = createGridHTML(window.activeDay, window.activeShift);
        
        const legendas = window.config[window.activeShift].legendasPorDia || {};
        document.getElementById("footerLegend").innerText = legendas[window.activeDay] || `⏱️ INTERVALOS...`;
    }

    document.getElementById("teacherSearch").oninput = (e) => { searchTerm = e.target.value; window.renderAll(); };
</script>
</body>
</html>
