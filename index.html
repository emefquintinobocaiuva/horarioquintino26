<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Quintino · Sincronizado</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #eef2f8; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .header-institucional { width: 100%; max-width: 1400px; margin: 0 auto 15px; display: flex; justify-content: center; background: white; padding: 10px; border-radius: 15px; }
        .header-institucional img { width: 100%; max-width: 1200px; height: auto; }
        .main-container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        /* Cores e Status */
        .status-bar { text-align: center; font-weight: bold; padding: 10px; border-radius: 10px; margin-bottom: 10px; background: #f1f5f9; color: #1e3a5f; }
        .cell-hi { background-color: #ffcfcf !important; border: 1px solid #ef4444 !important; }
        .cell-hl { background-color: #d1fae5 !important; border: 1px solid #10b981 !important; }
        
        /* Botões */
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
        .btn { border: none; padding: 12px 20px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-navy { background: #1e3a5f; }
        .btn-save { background: #10b981; border: 2px solid #059669; }
        .btn-red { background: #ef4444; }

        /* Grade */
        .schedule-grid { display: grid; grid-template-columns: 100px repeat(16, minmax(65px, 1fr)); border: 1px solid #cbd5e1; font-size: 0.65rem; margin-bottom: 20px; }
        .grid-header, .time-slot { background: #f8fafc; font-weight: bold; text-align: center; border: 0.5px solid #cbd5e1; min-height: 45px; display: flex; align-items: center; justify-content: center; }
        .schedule-cell { background: white; border: 0.5px solid #e2e8f0; padding: 4px; min-height: 70px; cursor: pointer; text-align: center; }
        
        .tabs-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .tab.active { background: #1e3a5f; color: white; }

        @media print {
            .toolbar, .tabs-row, .status-bar { display: none !important; }
            @page { size: A4 landscape; margin: 5mm; }
        }
    </style>
</head>
<body>

<div class="header-institucional">
    <img src="https://raw.githubusercontent.com/emefquintinobocaiuva/horarioquintino26/main/imagens/cabecquintino.jpg">
</div>

<div class="main-container">
    <div id="statusMsg" class="status-bar">☁️ Conectando à nuvem...</div>
    
    <div class="toolbar">
        <button class="btn btn-navy" onclick="copyFullDay()">📋 Copiar Dia</button>
        <button class="btn btn-navy" onclick="pasteFullDay()">📥 Colar Dia</button>
        <button class="btn btn-save" onclick="saveToCloud()">💾 SALVAR PARA TODAS</button>
        <button class="btn btn-red" onclick="window.print()">🖨️ PDF (5 DIAS)</button>
    </div>
    
    <div class="tabs-row" id="shiftTabs"></div>
    <div class="tabs-row" id="dayTabs"></div>
    <div id="scheduleGrid"></div>

    <div style="background:#fffbeb; padding:15px; border:2px dashed orange; border-radius:10px;">
        <div id="footerLegend" contenteditable="true" onblur="saveToCloud()" style="font-weight:bold; outline:none;">⏱️ INTERVALOS...</div>
    </div>
</div>

<script>
    // === COLE SEU LINK DO GOOGLE AQUI ===
    const DATABASE_URL = "COLE_AQUI_O_LINK_DO_PASSO_3"; 

    const DIAS = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];
    let activeShift = "manha";
    let activeDay = "Segunda";
    let dayClipboard = null;

    let config = {
        manha: { 
            aulas: [{l:"1ª",h:"7:10"},{l:"2ª",h:"8:00"},{l:"3ª",h:"8:50"},{l:"4ª",h:"10:00"},{l:"5ª",h:"10:50"}],
            turmas: ["1ºA","1ºB","1ºC","1ºD","1ºE","2ºA","2ºB","2ºC","3ºA","3ºB","4ºA","4ºB","4ºC","5ºA","5ºB","5ºC"],
            data: {}, legenda: "⏱️ INTERVALOS MANHÃ: ..."
        },
        tarde: {
            aulas: [{l:"1ª",h:"13:30"},{l:"2ª",h:"14:20"},{l:"3ª",h:"15:10"},{l:"4ª",h:"16:20"},{l:"5ª",h:"17:10"}],
            turmas: ["1ºE","1ºF","1ºG","2ºD","2ºE","2ºF","2ºG","3ºD","3ºE","3ºF","4ºD","4ºE","4ºF","5ºD","5ºE","5ºF"],
            data: {}, legenda: "⏱️ INTERVALOS TARDE: ..."
        }
    };

    // --- FUNÇÕES DE NUVEM ---
    async function saveToCloud() {
        document.getElementById("statusMsg").innerText = "⏳ SALVANDO NA NUVEM... POR FAVOR, AGUARDE.";
        config[activeShift].legenda = document.getElementById("footerLegend").innerText;
        
        try {
            await fetch(DATABASE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(config)
            });
            setTimeout(() => {
                document.getElementById("statusMsg").innerText = "✅ SALVO COM SUCESSO! TODAS AS GESTORAS JÁ PODEM VER.";
            }, 1500);
        } catch (e) {
            document.getElementById("statusMsg").innerText = "❌ ERRO AO SALVAR! VERIFIQUE SUA INTERNET.";
        }
    }

    async function loadFromCloud() {
        try {
            const response = await fetch(DATABASE_URL);
            const savedData = await response.json();
            if(Object.keys(savedData).length > 0) {
                config = savedData;
                document.getElementById("statusMsg").innerText = "✅ DADOS SINCRONIZADOS COM A PLANILHA.";
            } else {
                initData();
                document.getElementById("statusMsg").innerText = "⚠️ PLANILHA VAZIA. COMECE A DIGITAR!";
            }
            renderAll();
        } catch (e) {
            document.getElementById("statusMsg").innerText = "⚠️ INICIANDO SEM NUVEM (MODO LOCAL).";
            initData();
            renderAll();
        }
    }

    // --- LÓGICA DO APP ---
    function initData() {
        ["manha", "tarde"].forEach(s => {
            DIAS.forEach(d => {
                if(!config[s].data[d]) {
                    config[s].data[d] = Array(5).fill().map(() => Array(16).fill().map(() => ({ teacher: "Livre", room: "---" })));
                }
            });
        });
    }

    function renderAll() {
        document.getElementById("shiftTabs").innerHTML = ["manha", "tarde"].map(s => 
            `<div class="tab ${activeShift===s?'active':''}" onclick="activeShift='${s}';renderAll()">${s.toUpperCase()}</div>`).join("");
        document.getElementById("dayTabs").innerHTML = DIAS.map(d => 
            `<div class="tab ${activeDay===d?'active':''}" onclick="activeDay='${d}';renderAll()">${d}</div>`).join("");
        
        const shift = config[activeShift];
        const gridData = shift.data[activeDay];
        let html = `<div class="schedule-grid"><div class="grid-header">Horas</div>`;
        shift.turmas.forEach(t => html += `<div class="grid-header">${t}</div>`);

        shift.aulas.forEach((aula, aIdx) => {
            html += `<div class="time-slot">${aula.l}<br>${aula.h}</div>`;
            shift.turmas.forEach((turma, tIdx) => {
                const cell = gridData[aIdx][tIdx];
                const prof = cell.teacher.toUpperCase();
                let colorClass = prof.includes("HI") ? "cell-hi" : (prof.includes("HL") ? "cell-hl" : "");
                
                html += `<div class="schedule-cell ${colorClass}" onclick="editCell(${aIdx}, ${tIdx})">
                            <strong>${cell.teacher}</strong><br><small>S: ${cell.room}</small>
                         </div>`;
            });
        });
        document.getElementById("scheduleGrid").innerHTML = html + `</div>`;
        document.getElementById("footerLegend").innerText = shift.legenda;
    }

    function editCell(aIdx, tIdx) {
        const data = config[activeShift].data[activeDay][aIdx][tIdx];
        const n = prompt("Professor:", data.teacher);
        if (n !== null) {
            config[activeShift].data[activeDay][aIdx][tIdx] = { teacher: n || "Livre", room: prompt("Sala:", data.room) || "---" };
            renderAll();
        }
    }

    function copyFullDay() { dayClipboard = JSON.parse(JSON.stringify(config[activeShift].data[activeDay])); alert("Dia copiado!"); }
    function pasteFullDay() { if(dayClipboard) { config[activeShift].data[activeDay] = JSON.parse(JSON.stringify(dayClipboard)); renderAll(); } }

    loadFromCloud();
</script>
</body>
</html>
