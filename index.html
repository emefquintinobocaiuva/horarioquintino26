<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Horários · EMEF Quintino Bocaiuva</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #eef2f8; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }

        /* Cabeçalho */
        .header-institucional { width: 100%; max-width: 1400px; margin: 0 auto 15px; display: flex; justify-content: center; background: white; padding: 10px; border-radius: 15px; }
        .header-institucional img { width: 100%; max-width: 1200px; height: auto; }

        .main-container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        /* Toolbar */
        .toolbar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; align-items: center; }
        .search-container { flex-grow: 1; display: flex; gap: 10px; align-items: center; }
        .search-input { flex-grow: 1; padding: 10px 20px; border-radius: 40px; border: 2px solid #cbd5e1; outline: none; }

        /* Botões Navy Blue */
        .btn { border: none; padding: 10px 20px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-navy { background: #1e3a5f; }
        .btn-red { background: #ef4444; }
        .btn-lock { background: #64748b; font-size: 1.1rem; padding: 8px 15px; }
        .btn-lock.unlocked { background: #f59e0b; }

        /* Modal Login */
        #loginOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 350px; text-align: center; }
        .login-box input, .login-box select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }

        /* Grade de Horários */
        .schedule-grid { display: grid; grid-template-columns: 100px repeat(16, minmax(65px, 1fr)); border: 1px solid #cbd5e1; font-size: 0.65rem; margin-bottom: 20px; background: white; }
        .grid-header, .time-slot { background: #f8fafc; font-weight: bold; text-align: center; padding: 6px 2px; border: 0.5px solid #cbd5e1; min-height: 45px; display: flex; align-items: center; justify-content: center; }
        .schedule-cell { border: 0.5px solid #e2e8f0; padding: 4px; min-height: 70px; cursor: grab; position: relative; }
        .cell-highlight { background-color: #bae6fd !important; }

        /* Abas */
        .tabs-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .tab.active { background: #1e3a5f; color: white; }

        /* Rodapé Editável */
        .footer-area { margin-top: 20px; padding: 20px; border-radius: 12px; background: #fffbeb; border: 2px dashed #f59e0b; }
        .editable-legend { font-size: 1rem; min-height: 40px; outline: none; font-weight: bold; color: #1e3a5f; border-bottom: 1px solid #fde68a; margin-bottom: 10px; padding: 5px; }
        .static-instructions { font-size: 0.8rem; color: #475569; line-height: 1.6; }

        /* REGRAS DE IMPRESSÃO - A4 PAISAGEM */
        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            body { background: white; padding: 0; }
            .toolbar, .tabs-row, .btn-lock, #loginOverlay, .static-instructions, .header-institucional { display: none !important; }
            .main-container { box-shadow: none; border: none; width: 100%; max-width: none; padding: 0; }
            #scheduleGrid { display: none !important; } /* Esconde a grade de visualização */
            #printArea { display: block !important; } /* Mostra a grade de impressão */
            .print-day-title { background: #1e3a5f; color: white; padding: 5px 15px; margin-top: 20px; border-radius: 5px; text-transform: uppercase; font-size: 0.9rem; }
            .schedule-grid { page-break-inside: avoid; margin-bottom: 30px; }
            .footer-area { border: none; background: transparent; page-break-before: avoid; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>Acesso Gestão</h3>
        <select id="userSelect">
            <option value="DIR">DIR: Karen</option>
            <option value="VIC">VIC: Veronica</option>
            <option value="CRD">CRD: Larissa</option>
        </select>
        <input type="password" id="passInput" placeholder="Senha">
        <button class="btn btn-navy" style="width:100%" onclick="tryLogin()">Entrar</button>
        <button class="btn" style="background:none; color:gray" onclick="closeLogin()">Cancelar</button>
    </div>
</div>

<div class="header-institucional">
    <img src="https://raw.githubusercontent.com/emefquintinobocaiuva/horarioquintino26/main/imagens/cabecquintino.jpg">
</div>

<div class="main-container">
    <div class="toolbar">
        <div class="search-container">
            <input type="text" id="teacherSearch" class="search-input" placeholder="🔍 Buscar professor...">
            <button id="lockBtn" class="btn btn-lock" onclick="openLogin()">🔒</button>
        </div>
        
        <div id="editButtons" style="display:none; gap:8px;">
            <button class="btn btn-navy" onclick="copyFullDay()">📋 Copiar Dia</button>
            <button class="btn btn-navy" onclick="pasteFullDay()">📥 Colar Dia Aqui</button>
        </div>

        <button class="btn btn-navy" onclick="saveToLocal()">💾 Salvar</button>
        <button class="btn btn-red" onclick="window.print()">🖨️ Gerar PDF (5 Dias)</button>
    </div>
    
    <div class="tabs-row" id="shiftTabs"></div>
    <div class="tabs-row" id="dayTabs"></div>
    
    <div id="scheduleGrid"></div>

    <div id="printArea" style="display:none;"></div>

    <div class="footer-area">
        <div class="editable-legend" id="footerLegend" contenteditable="false" onblur="saveToLocal()">
            ⏱️ INTERVALOS...
        </div>
        <div class="static-instructions">
            <b>COMANDOS:</b> Arrastar para Mover | Ctrl+Arrastar para Duplicar.
        </div>
    </div>
</div>

<script>
    const DIAS = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];
    let isEditing = false;
    let userPass = "321";
    let dayClipboard = null;
    let draggedData = null;

    let config = {
        manha: { 
            aulas: [{l:"1ª",h:"7:10"},{l:"2ª",h:"8:00"},{l:"3ª",h:"8:50"},{l:"4ª",h:"10:00"},{l:"5ª",h:"10:50"}],
            turmas: ["1ºA","1ºB","1ºC","1ºD","1ºE","2ºA","2ºB","2ºC","3ºA","3ºB","4ºA","4ºB","4ºC","5ºA","5ºB","5ºC"],
            data: {},
            legenda: "⏱️ INTERVALOS MANHÃ: 1º: 9:20 | 2º/3º: 9:40 | 4º: 8:50 | 5º: 10:10"
        },
        tarde: {
            aulas: [{l:"1ª",h:"13:30"},{l:"2ª",h:"14:20"},{l:"3ª",h:"15:10"},{l:"4ª",h:"16:20"},{l:"5ª",h:"17:10"}],
            turmas: ["1ºE","1ºF","1ºG","2ºD","2ºE","2ºF","2ºG","3ºD","3ºE","3ºF","4ºD","4ºE","4ºF","5ºD","5ºE","5ºF"],
            data: {},
            legenda: "⏱️ INTERVALOS TARDE: 1º: 14:40 | 2º: 15:10 | 3º: 15:40 | 4º/5º: 16:00"
        }
    };

    let activeShift = "manha";
    let activeDay = "Segunda";
    let searchTerm = "";

    // --- LÓGICA DE DRAG & DROP ---
    function handleDragStart(e, aIdx, tIdx) {
        if(!isEditing) return e.preventDefault();
        const content = config[activeShift].data[activeDay][aIdx][tIdx];
        draggedData = { aIdx, tIdx, content: {...content} };
        e.dataTransfer.setData("text/plain", "");
    }

    function handleDrop(e, aIdx, tIdx) {
        e.preventDefault();
        if(!isEditing || !draggedData) return;
        if (!e.ctrlKey) { config[activeShift].data[activeDay][draggedData.aIdx][draggedData.tIdx] = { teacher: "Livre", room: "---" }; }
        config[activeShift].data[activeDay][aIdx][tIdx] = draggedData.content;
        draggedData = null;
        saveToLocal();
        renderAll();
    }

    // --- REPLICAR DIA ---
    function copyFullDay() {
        dayClipboard = JSON.parse(JSON.stringify(config[activeShift].data[activeDay]));
        alert(`Horário de ${activeDay} copiado!`);
    }
    function pasteFullDay() {
        if(!dayClipboard) return alert("Copie um dia primeiro!");
        if(confirm(`Substituir horário de ${activeDay}?`)) {
            config[activeShift].data[activeDay] = JSON.parse(JSON.stringify(dayClipboard));
            saveToLocal();
            renderAll();
        }
    }

    // --- LOGIN ---
    function tryLogin() {
        if(document.getElementById("passInput").value === userPass) {
            isEditing = true;
            document.getElementById("lockBtn").classList.add("unlocked");
            document.getElementById("footerLegend").contenteditable = "true";
            document.getElementById("editButtons").style.display = "flex";
            closeLogin();
            renderAll();
        } else { alert("Senha incorreta!"); }
    }
    function openLogin() { if(isEditing) location.reload(); else document.getElementById("loginOverlay").style.display = "flex"; }
    function closeLogin() { document.getElementById("loginOverlay").style.display = "none"; }

    // --- PERSISTÊNCIA ---
    function saveToLocal() {
        config[activeShift].legenda = document.getElementById("footerLegend").innerText;
        localStorage.setItem("db_quintino_v5", JSON.stringify({config, userPass}));
    }

    function loadFromLocal() {
        const saved = localStorage.getItem("db_quintino_v5");
        if(saved) {
            const parsed = JSON.parse(saved);
            config = parsed.config;
            userPass = parsed.userPass;
        } else {
            ["manha", "tarde"].forEach(s => {
                DIAS.forEach(d => {
                    config[s].data[d] = Array(5).fill().map(() => Array(16).fill().map(() => ({ teacher: "Livre", room: "---" })));
                });
            });
        }
    }

    // --- RENDERIZAÇÃO ---
    function createGridHTML(dia, shiftKey) {
        const shift = config[shiftKey];
        const gridData = shift.data[dia];
        let html = `<div class="schedule-grid">`;
        html += `<div class="grid-header">Horas</div>`;
        shift.turmas.forEach((t, i) => html += `<div class="grid-header" ${isEditing?'contenteditable="true"':''} onblur="updateLabel(${i}, this.innerText, 'turma')">${t}</div>`);

        shift.aulas.forEach((aula, aIdx) => {
            html += `<div class="time-slot" ${isEditing?'contenteditable="true"':''} onblur="updateLabel(${aIdx}, this.innerText, 'aula')">${aula.l}\n${aula.h}</div>`;
            shift.turmas.forEach((turma, tIdx) => {
                const cell = gridData[aIdx][tIdx];
                const prof = cell.teacher.toUpperCase();
                let classes = "schedule-cell";
                if (searchTerm && prof !== "LIVRE" && prof.includes(searchTerm.toUpperCase())) classes += " cell-highlight";
                
                html += `<div class="${classes}" 
                            draggable="${isEditing}" 
                            ondragstart="handleDragStart(event, ${aIdx}, ${tIdx})"
                            ondragover="event.preventDefault()"
                            ondrop="handleDrop(event, ${aIdx}, ${tIdx})"
                            onclick="editCell(${aIdx}, ${tIdx})">
                            <div style="font-weight:bold; text-align:center;">${cell.teacher}</div>
                            <div style="font-size:0.55rem; color:#92400e; text-align:center;">S: ${cell.room}</div>
                         </div>`;
            });
        });
        html += `</div>`;
        return html;
    }

    function updateLabel(idx, val, type) {
        if(type === 'turma') config[activeShift].turmas[idx] = val;
        else { let p = val.split("\n"); config[activeShift].aulas[idx] = {l: p[0]||"", h: p[1]||""}; }
        saveToLocal();
    }

    function editCell(aIdx, tIdx) {
        if(!isEditing) return;
        const data = config[activeShift].data[activeDay][aIdx][tIdx];
        const n = prompt("Professor:", data.teacher);
        if (n !== null) {
            const r = prompt("Sala:", data.room);
            config[activeShift].data[activeDay][aIdx][tIdx] = { teacher: n || "Livre", room: r || "---" };
            saveToLocal();
            renderAll();
        }
    }

    function renderAll() {
        // Abas
        document.getElementById("shiftTabs").innerHTML = ["manha", "tarde"].map(s => `<div class="tab ${activeShift===s?'active':''}" onclick="activeShift='${s}';renderAll()">${s.toUpperCase()}</div>`).join("");
        document.getElementById("dayTabs").innerHTML = DIAS.map(d => `<div class="tab ${activeDay===d?'active':''}" onclick="activeDay='${d}';renderAll()">${d}</div>`).join("");
        
        // Visualização Principal
        document.getElementById("scheduleGrid").innerHTML = createGridHTML(activeDay, activeShift);
        document.getElementById("footerLegend").innerText = config[activeShift].legenda;

        // Montagem da Área de Impressão (Todos os 5 dias)
        let printHTML = `<h2 style="text-align:center; color:#1e3a5f;">EMEF QUINTINO BOCAIUVA - TURNO ${activeShift.toUpperCase()}</h2>`;
        DIAS.forEach(d => {
            printHTML += `<div class="print-day-title">${d}</div>`;
            printHTML += createGridHTML(d, activeShift);
        });
        printHTML += `<div style="margin-top:10px; font-weight:bold;">${config[activeShift].legenda}</div>`;
        document.getElementById("printArea").innerHTML = printHTML;
    }

    document.getElementById("teacherSearch").oninput = (e) => { searchTerm = e.target.value; renderAll(); };

    loadFromLocal();
    renderAll();
</script>
</body>
</html>
