<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horário Escolar 2026 · EMEF Quintino Bocaiuva</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #eef2f8; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 10px; }

        .header-institucional {
            width: 100%; max-width: 1400px; margin: 0 auto 15px auto;
            display: flex; justify-content: center; background: white;
            padding: 10px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .header-institucional img { width: 100%; max-width: 1200px; height: auto; }

        .main-container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .toolbar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; align-items: center; }
        .search-container { flex-grow: 1; min-width: 250px; }
        .search-input { width: 100%; padding: 10px 20px; border-radius: 40px; border: 2px solid #cbd5e1; outline: none; }

        .toolbar button { border: none; padding: 10px 20px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; }
        #saveBtn { background: #1e3a5f; }
        #printBtn { background: #ef4444; }
        #resetBtn { background: #86efac; color: #064e3b; }

        .shift-tabs, .day-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .shift-tab, .day-tab { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-weight: 600; color: #475569; }
        .shift-tab.active, .day-tab.active { background: #1e3a5f !important; color: white !important; }

        /* Estilo da Grade */
        .schedule-grid {
            display: grid; grid-template-columns: 90px repeat(16, minmax(60px, 1fr));
            border: 1px solid #cbd5e1; font-size: 0.65rem; margin-bottom: 30px;
        }
        .grid-header, .time-slot { background: #f8fafc; font-weight: bold; text-align: center; padding: 6px 2px; border: 0.5px solid #cbd5e1; }
        .schedule-cell { background: white; border: 0.5px solid #e2e8f0; padding: 4px; min-height: 55px; cursor: grab; position: relative; }
        .teacher-card { font-weight: bold; text-align: center; pointer-events: none; }
        .room-info { font-size: 0.55rem; color: #92400e; text-align: center; display: block; pointer-events: none; }

        /* Cores Especiais */
        .cell-highlight { background-color: #bae6fd !important; }
        .cell-dimmed { opacity: 0.2; }
        .cell-hi { background-color: #fef08a !important; }
        .cell-hl { background-color: #bbf7d0 !important; }

        .print-only { display: none; }

        /* REGRAS DE IMPRESSÃO - PDF PAISAGEM COMPLETO */
        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            .toolbar, .shift-tabs, .day-tabs, .main-container > #scheduleGrid, .legend { display: none !important; }
            .print-only { display: block !important; }
            .print-day-title { font-size: 14px; font-weight: bold; margin: 15px 0 5px 0; text-align: left; color: #1e3a5f; border-bottom: 2px solid #1e3a5f; }
            .schedule-grid { page-break-inside: avoid; margin-bottom: 20px; width: 100% !important; grid-template-columns: 80px repeat(16, 1fr) !important; }
            .header-institucional { margin-bottom: 10px; }
            body { background: white; }
        }

        .legend { margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 10px; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

<div class="header-institucional">
    <img src="cabecquintino.jpg" alt="Cabeçalho EMEF Quintino Bocaiuva">
</div>

<div class="main-container">
    <div class="toolbar">
        <div class="search-container">
            <input type="text" id="teacherSearch" class="search-input" placeholder="🔍 Buscar Professor...">
        </div>
        <button id="saveBtn">💾 Salvar</button>
        <button id="printBtn">🖨️ PDF Completo (Seg-Sex)</button>
        <button id="resetBtn">🔄 Restaurar</button>
    </div>
    
    <div class="shift-tabs" id="shiftTabs"></div>
    <div class="day-tabs" id="dayTabs"></div>
    
    <div id="scheduleGrid"></div>

    <div id="printArea" class="print-only"></div>

    <div class="legend" id="legendArea"></div>
</div>

<script>
    const DIAS = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];
    const MORNING_AULAS = [{label:"1ª", h:"7:10-8:00"}, {label:"2ª", h:"8:00-8:50"}, {label:"3ª", h:"8:50-10:00"}, {label:"4ª", h:"10:00-10:50"}, {label:"5ª", h:"10:50-11:40"}];
    const AFTERNOON_AULAS = [{label:"1ª", h:"13:30-14:20"}, {label:"2ª", h:"14:20-15:10"}, {label:"3ª", h:"15:10-16:20"}, {label:"4ª", h:"16:20-17:10"}, {label:"5ª", h:"17:10-18:00"}];
    
    let TURMAS_MANHA = ["1ºA","1ºB","1ºC","1ºD","1ºE","2ºA","2ºB","2ºC","3ºA","3ºB","4ºA","4ºB","4ºC","5ºA","5ºB","5ºC"];
    let TURMAS_TARDE = ["1ºE","1ºF","1ºG","2ºD","2ºE","2ºF","2ºG","3ºD","3ºE","3ºF","4ºD","4ºE","4ºF","5ºD","5ºE","5ºF"];

    let morningData, afternoonData;
    let activeShift = "manha";
    let activeDay = "Segunda";
    let searchTerm = "";
    let draggedData = null;

    function initData() {
        const criar = (turmas) => {
            let d = {}; DIAS.forEach(dia => {
                d[dia] = Array(5).fill().map(() => Array(turmas.length).fill().map(() => ({ teacher: "Livre", room: "---" })));
            }); return d;
        };
        morningData = criar(TURMAS_MANHA);
        afternoonData = criar(TURMAS_TARDE);
    }

    // --- LÓGICA DE DRAG & DROP ---
    function onDragStart(e, aIdx, tIdx) {
        const data = activeShift === "manha" ? morningData : afternoonData;
        draggedData = { aIdx, tIdx, content: {...data[activeDay][aIdx][tIdx]}, isCopy: e.ctrlKey || e.metaKey };
        e.dataTransfer.setData("text/plain", ""); // Necessário para Firefox
    }

    function onDrop(e, aIdx, tIdx) {
        e.preventDefault();
        const data = activeShift === "manha" ? morningData : afternoonData;
        
        if (!draggedData) return;

        // Se NÃO for cópia, limpa a origem
        if (!draggedData.isCopy) {
            data[activeDay][draggedData.aIdx][draggedData.tIdx] = { teacher: "Livre", room: "---" };
        }
        
        // Aplica ao destino
        data[activeDay][aIdx][tIdx] = draggedData.content;
        renderAll();
    }

    // --- RENDERIZAÇÃO ---
    function createGridHTML(dia, isPrint = false) {
        const data = activeShift === "manha" ? morningData : afternoonData;
        const turmas = activeShift === "manha" ? TURMAS_MANHA : TURMAS_TARDE;
        const aulas = activeShift === "manha" ? MORNING_AULAS : AFTERNOON_AULAS;
        
        let html = `<div class="schedule-grid">`;
        html += `<div class="grid-header">Horas</div>`;
        turmas.forEach(t => html += `<div class="grid-header">${t}</div>`);

        aulas.forEach((aula, aIdx) => {
            html += `<div class="time-slot">${aula.label}<br>${aula.h}</div>`;
            turmas.forEach((turma, tIdx) => {
                const cell = data[dia][aIdx][tIdx];
                const prof = cell.teacher.toUpperCase();
                let classes = "schedule-cell";
                
                if (searchTerm && prof !== "LIVRE") {
                    if (prof.includes(searchTerm.toUpperCase())) classes += " cell-highlight";
                    else classes += " cell-dimmed";
                }
                if (prof.includes("HI")) classes += " cell-hi";
                if (prof.includes("HL")) classes += " cell-hl";

                html += `<div class="${classes}" 
                            draggable="true" 
                            ondragstart="onDragStart(event, ${aIdx}, ${tIdx})"
                            ondragover="event.preventDefault()"
                            ondrop="onDrop(event, ${aIdx}, ${tIdx})"
                            onclick="editCellManual(${aIdx}, ${tIdx})">
                            <div class="teacher-card">${cell.teacher}</div>
                            <div class="room-info">S: ${cell.room}</div>
                         </div>`;
            });
        });
        html += `</div>`;
        return html;
    }

    function preparePrint() {
        const printArea = document.getElementById("printArea");
        printArea.innerHTML = `<h2>HORÁRIO ESCOLAR 2026 - PERÍODO ${activeShift.toUpperCase()}</h2>`;
        DIAS.forEach(dia => {
            printArea.innerHTML += `<div class="print-day-title">${dia.toUpperCase()}</div>`;
            printArea.innerHTML += createGridHTML(dia, true);
        });
    }

    function editCellManual(aIdx, tIdx) {
        const data = activeShift === "manha" ? morningData : afternoonData;
        const n = prompt("Professor:", data[activeDay][aIdx][tIdx].teacher);
        if (n !== null) {
            const r = prompt("Sala:", data[activeDay][aIdx][tIdx].room);
            data[activeDay][aIdx][tIdx] = { teacher: n || "Livre", room: r || "---" };
            renderAll();
        }
    }

    function renderAll() {
        // Abas
        document.getElementById("shiftTabs").innerHTML = ["manha", "tarde"].map(s => 
            `<button class="shift-tab ${activeShift===s?'active':''}" onclick="activeShift='${s}';renderAll()"> ${s==='manha'?'🌅 MANHÃ':'🌙 TARDE'}</button>`).join("");
        
        document.getElementById("dayTabs").innerHTML = DIAS.map(d => 
            `<button class="day-tab ${activeDay===d?'active':''}" onclick="activeDay='${d}';renderAll()">${d}</button>`).join("");

        // Grade Tela
        document.getElementById("scheduleGrid").innerHTML = createGridHTML(activeDay);
        
        // Legenda e PDF
        const mLeg = `⏱️ <b>INTERVALOS MANHÃ:</b> 1º: 9:20-9:40 | 2º e 3º: 9:40-10:00 | 4º: 8:50-9:10 | 5º: 10:10-10:30`;
        const tLeg = `⏱️ <b>INTERVALOS TARDE:</b> 1º: 14:40-15:00 | 2º: 15:10-15:30 | 3º: 15:40-16:00 | 4º e 5º: 16:00-16:20`;
        document.getElementById("legendArea").innerHTML = (activeShift === "manha" ? mLeg : tLeg) + `<br>🖱️ <b>Arrastar:</b> Mover | <b>Ctrl+Arrastar:</b> Copiar | <b>Clique:</b> Editar | <b>PDF:</b> Gera todos os dias.`;
        
        preparePrint();
    }

    document.getElementById("teacherSearch").oninput = (e) => { searchTerm = e.target.value; renderAll(); };
    document.getElementById("printBtn").onclick = () => window.print();
    document.getElementById("saveBtn").onclick = () => alert("Salvo!");
    document.getElementById("resetBtn").onclick = () => { if(confirm("Resetar?")) { initData(); renderAll(); } };

    initData();
    renderAll();
</script>
</body>
</html>
